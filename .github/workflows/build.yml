name: Build Proton Wine 10 Optimized

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo dpkg --add-architecture arm64
        
        # Create a clean sources.list for both amd64 and arm64
        sudo tee /etc/apt/sources.list <<EOF
        deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ $(lsb_release -sc) main restricted universe multiverse
        deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ $(lsb_release -sc)-updates main restricted universe multiverse
        deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ $(lsb_release -sc)-backports main restricted universe multiverse
        deb [arch=amd64] http://security.ubuntu.com/ubuntu/ $(lsb_release -sc)-security main restricted universe multiverse
        
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -sc) main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -sc)-updates main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -sc)-backports main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -sc)-security main restricted universe multiverse
        EOF
        
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          flex \
          bison \
          libx11-dev:arm64 \
          libfreetype-dev:arm64 \
          libvulkan-dev:arm64 \
          libxcomposite-dev:arm64 \
          libxcursor-dev:arm64 \
          libxfixes-dev:arm64 \
          libxi-dev:arm64 \
          libxrandr-dev:arm64 \
          libxrender-dev:arm64 \
          libxext-dev:arm64 \
          libgstreamer1.0-dev:arm64 \
          libgstreamer-plugins-base1.0-dev:arm64 \
          libsdl2-dev:arm64 \
          libosmesa6-dev:arm64 \
          libgnutls28-dev:arm64 \
          libdbus-1-dev:arm64 \
          libfontconfig1-dev:arm64 \
          libudev-dev:arm64

    - name: Configure Wine
      run: |
        ./configure \
          --host=aarch64-linux-gnu \
          --target=aarch64-linux-gnu \
          --with-x \
          --with-vulkan \
          --with-sdl \
          --with-gstreamer \
          --without-oss \
          --disable-tests \
          --prefix=$GITHUB_WORKSPACE/proton-wine-arm64

    - name: Build Wine
      run: make -j$(nproc)

    - name: Install Wine
      run: make install

    - name: Package Build
      run: |
        tar -czvf proton-wine-10-optimized-arm64.tar.gz -C $GITHUB_WORKSPACE/proton-wine-arm64 .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: proton-wine-10-optimized-arm64
        path: proton-wine-10-optimized-arm64.tar.gz
